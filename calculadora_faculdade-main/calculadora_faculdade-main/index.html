<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculadora">

        <h1>Calculadora</h1>

        <input type="number" id="numero1" placeholder="Primeiro número">

        <input type="number" id="numero2" placeholder="Segundo número">

        <div class="botoes">
            <button id="somar">+</button>
            <button id="subtrair">-</button>
            <button id="multiplicar">×</button>
            <button id="dividir">÷</button>
            <button id="limpar">C</button>
        </div>

        <h2>Resultado:</h2>
        <p id="resultado">0</p>

    </div>

    <script src="script.js"></script>

</body>

</html>
